AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: treuepunkte-lambda

Parameters:
  AppEnv:
    Type: String
    AllowedValues:
      - staging
      - production

  DbHost:
    Type: String

  DbPort:
    Type: String
    Default: "3306"

  DbUser:
    Type: String

  DbName:
    Type: String

  DbPassSecretName:
    Type: String

  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  LambdaSubnet1:
    Type: AWS::EC2::Subnet::Id

  LambdaSubnet2:
    Type: AWS::EC2::Subnet::Id

  LambdaSubnet3:
    Type: AWS::EC2::Subnet::Id

Globals:
  Function:
    Timeout: 5
    MemorySize: 128

Resources:
  TreuepunkteFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      CodeUri: treuepunkte-function/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref LambdaSubnet1
          - !Ref LambdaSubnet2
          - !Ref LambdaSubnet3
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_USER: !Ref DbUser
          DB_PASS: !Sub "{{resolve:secretsmanager:${DbPassSecretName}}}"
          DB_NAME: !Ref DbName
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  TreuepunkteApi:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/"

  TreuepunkteFunctionArn:
    Description: Treuepunkte Lambda Function ARN
    Value: !GetAtt TreuepunkteFunction.Arn

  TreuepunkteFunctionRoleArn:
    Description: Implicit IAM Role for Treuepunkte function
    Value: !GetAtt TreuepunkteFunctionRole.Arn