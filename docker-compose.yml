services:
  db:
    image: mariadb:11.4
    container_name: treuepunkte-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: treuepunkte
      MARIADB_USER: treuepunkte
      MARIADB_PASSWORD: treuepunkte
    ports:
      - "3306:3306"
    volumes:
      - treuepunkte_db_data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: treuepunkte-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: treuepunkte
      DB_PASS: treuepunkte
      DB_NAME: treuepunkte
    ports:
      - "8080:8080"

volumes:
  treuepunkte_db_data: