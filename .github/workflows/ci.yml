name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'staging'
          - 'production'
      confirm_production:
        description: 'Confirm production deployment'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: treuepunkte-function/go.sum

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Run tests
        run: make test

      - name: Validate SAM template
        run: make validate

      - name: Build SAM application
        run: make build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging'
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: treuepunkte-function/go.sum

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Build SAM application
        run: make build

      - name: Deploy to staging
        run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset

  deploy-production:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production' && github.event.inputs.confirm_production == 'yes'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: treuepunkte-function/go.sum

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Build SAM application
        run: make build

      - name: Deploy to production
        run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset